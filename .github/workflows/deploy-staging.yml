name: Deploy staging

# Deploys the isolated staging stack (staging-cutlist-pro + staging-cutlist-pro-frontend)
# on every push to the `staging` branch. Production (cutlist-pro / cutlist-pro-frontend)
# is never touched by this workflow.
on:
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      STAGING_API_URL: https://staging-cutlist-pro.jussmor.workers.dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      # Deploy + migrate the API first so the staging API is live before the
      # frontend (which is built pointing at it) goes up.
      - name: Deploy API worker (staging)
        run: npx wrangler deploy workers/api.ts -c wrangler.staging.toml

      - name: Apply D1 migrations (staging)
        run: npx wrangler d1 migrations apply cutlist-db-staging --remote -c wrangler.staging.toml

      - name: Build frontend (staging API URL inlined)
        env:
          NEXT_PUBLIC_API_URL: ${{ env.STAGING_API_URL }}
        run: npx opennextjs-cloudflare build

      - name: Deploy frontend worker (staging)
        run: npx wrangler deploy -c wrangler.frontend.staging.toml
